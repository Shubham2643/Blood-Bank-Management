services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_SOCKET_URL=${VITE_SOCKET_URL:-}
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - backend/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/bloodbankmanagement
      NODE_ENV: production
      CLIENT_URL: http://localhost:5001
      SERVE_FRONTEND: "true"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
